apiVersion: v1
kind: Namespace
metadata:
  name: ollive
---
apiVersion: v1
kind: Secret
metadata:
  name: ollive-secrets
  namespace: ollive
type: Opaque
stringData:
  database-url: postgresql://ollive:ollive@postgres:5432/ollive
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ollive
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ollive
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: ollive
spec:
  selector:
    app: ingestion
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ollive
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollive-ingress
  namespace: ollive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ingestion
                port:
                  number: 8000
version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive
      POSTGRES_DB: ollive
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  ingestion:
    build: ./ingestion-service
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://ollive:ollive@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    environment:
      VITE_INGESTION_URL: http://localhost:8000
      VITE_ANTHROPIC_KEY: ${ANTHROPIC_API_KEY}

volumes:
  pgdata: